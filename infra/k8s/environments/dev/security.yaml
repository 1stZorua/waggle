Yes! Absolutely! That's where the actual values are being set for ArgoCD. Update it with the correct settings:
yamlcrowdsec:
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  persistence:
    size: 1Gi

  metrics:
    enabled: true

crowdsec-traefik-bouncer:
  crowdsec:
    mode: stream
    lapiHost: security-service.security
    lapiPort: 8080
    lapiKey: 'GTpbsoaXnMZfLNPMuctC5P5r9zd7NtnKzi4db8EhEYI'

    appsec:
      enabled: true
      host: security-appsec-service.security
      port: 7422
      failureBlock: true
      unreachableBlock: false

    logLevel: debug
    updateIntervalSeconds: 10
    defaultDecisionSeconds: 10

  traefik:
    namespace: gateway
