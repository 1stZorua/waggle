        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
  replication:
    replica:
      persistence:
        size: 1Gi
      resources:
        requests:
          cpu: 200m
          memory: 256Mi
        limits:
          cpu: 400m
          memory: 512Mi
  metrics:
    enabled: true

