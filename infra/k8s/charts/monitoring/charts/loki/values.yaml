loki:
  deploymentMode: SingleBinary

  loki:
    auth_enabled: false

    commonConfig:
      replication_factor: 1
      ring:
        kvstore:
          store: inmemory

    storage:
      type: filesystem
      bucketNames:
        chunks: chunks
        ruler: ruler
        admin: admin

    schemaConfig:
      configs:
        - from: '2024-04-01'
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: loki_index_
            period: 24h

    storage_config:
      filesystem:
        directory: /var/loki/chunks

    ingester:
      chunk_idle_period: 3m
      chunk_block_size: 262144
      chunk_retain_period: 1m
      lifecycler:
        ring:
          replication_factor: 1
      wal:
        dir: /var/loki/wal

  singleBinary:
    replicas: 1
    persistence:
      enabled: true
      size: 10Gi

  backend:
    replicas: 0
  read:
    replicas: 0
  write:
    replicas: 0

  chunksCache:
    enabled: false
  resultsCache:
    enabled: false
  test:
    enabled: false

  monitoring:
    selfMonitoring:
      enabled: false
      grafanaAgent:
        installOperator: false
