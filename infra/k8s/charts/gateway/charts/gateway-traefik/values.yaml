traefik:
  api:
    dashboard: true
    insecure: true

  ingressRoute:
    dashboard:
      enabled: true
      matchRule: Host(`dashboard.localhost`)
      entryPoints:
        - web
        - websecure

  providers:
    kubernetesCRD:
      enabled: true
      allowCrossNamespace: true

  ports:
    web:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true

  metrics:
    prometheus: {}
