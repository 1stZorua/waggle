---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: rate-limit-keycloak
  namespace: gateway
spec:
  rateLimit:
    average: 3
    burst: 5
    period: 1s
    sourceCriterion:
      ipStrategy:
        depth: 1
        excludedIPs:
          - 127.0.0.1/8
          - 10.0.0.0/8
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: rate-limit-auth
  namespace: gateway
spec:
  rateLimit:
    average: 10
    burst: 20
    sourceCriterion:
      ipStrategy:
        depth: 1
        excludedIPs:
          - 127.0.0.1/8
          - 10.0.0.0/8
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: rate-limit-internal
  namespace: gateway
spec:
  rateLimit:
    average: 500
    burst: 1000
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: rate-limit-admin
  namespace: gateway
spec:
  rateLimit:
    average: 50
    burst: 100
---

