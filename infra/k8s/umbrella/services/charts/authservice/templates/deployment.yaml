apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.name }}-depl
  labels:
    app: {{ .Values.name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Values.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.name }}
        metrics: "true"
    spec:
      containers:
        - name: {{ .Values.name }}
          image: {{ .Values.image }}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: {{ .Values.ports.http }}
            - name: grpc
              containerPort: {{ .Values.ports.grpc }}
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Development
            - name: KEYCLOAK_AUTH_SERVER_URL
              value: "http://identity-keycloak.identity.svc.cluster.local:80"
            - name: KEYCLOAK_REALM
              value: "test-realm"
            - name: KEYCLOAK_CLIENT_ID
              value: "test-client"
            - name: KEYCLOAK_CLIENT_SECRET
              value: "kctcoL0qKLVs3d7PlyhywnSyoXYGwvPy"        
            - name: KEYCLOAK_ADMIN_CLIENT_ID
              value: "admin-cli"
            - name: KEYCLOAK_ADMIN_CLIENT_SECRET
              value: "STxIrglGLTf9lHBJ1nst3HzLJQz8WiP8"
            - name: KEYCLOAK_AUTHORITY
              value: "http://identity-keycloak.identity.svc.cluster.local:80/realms/test-realm"
            - name: KEYCLOAK_AUDIENCE
              value: "test-client"
            - name: RabbitMQ__Host
              value: "messaging-rabbitmq.messaging.svc.cluster.local"
            - name: RabbitMQ__Port
              value: "5672"
            - name: RabbitMQ__Username
              value: "admin"
            - name: RabbitMQ__Password
              value: "admin"
            - name: RabbitMQ__VirtualHost
              value: "/"
            - name: Kestrel__Endpoints__webApi__Url
              value: "http://+:8080"
            - name: Kestrel__Endpoints__Grpc__Url
              value: "http://+:8081"
            - name: Kestrel__Endpoints__Grpc__Protocols
              value: "Http2"
            - name: GrpcUser
              value: "http://userservice-svc.app.svc.cluster.local:8081"
            - name: AUTH_MIN_USERNAME_LENGTH
              value: "3"
            - name: AUTH_MAX_USERNAME_LENGTH
              value: "20"
            - name: AUTH_MIN_PASSWORD_LENGTH
              value: "4"
            - name: AUTH_MAX_PASSWORD_LENGTH
              value: "128"
