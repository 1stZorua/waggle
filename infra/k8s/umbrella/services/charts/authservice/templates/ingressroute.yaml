{{- if .Values.ingress.enabled }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ .Values.name }}-ingressroute
spec:
  entryPoints:
    - web
    - websecure
  routes:
    - match: Host(`{{ .Values.host }}`)
      kind: Rule
      services:
        - name: {{ .Values.name }}-svc
          port: {{ .Values.ports.http }}
      middlewares:
        - name: internal-whitelist
          namespace: gateway
        - name: rate-limit-auth
          namespace: gateway
  tls:
    secretName: {{ .Values.name }}-local-tls
{{- end}}
