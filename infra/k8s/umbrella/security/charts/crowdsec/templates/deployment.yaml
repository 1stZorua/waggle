apiVersion: apps/v1
kind: Deployment
metadata:
  name: crowdsec
  namespace: security
  labels:
    app: crowdsec
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crowdsec
  template:
    metadata:
      labels:
        app: crowdsec
    spec:
      containers:
        - name: crowdsec
          image: '{{ .Values.image.repository }}:{{ .Values.image.tag }}'
          ports:
            - name: lapi
              containerPort: {{ .Values.service.port | int }}
          env:
            - name: COLLECTIONS
              value: {{ join " " .Values.collections | quote }}
          volumeMounts:
            - name: config
              mountPath: /etc/crowdsec/acquis.yaml
              subPath: acquis.yaml
            - name: data
              mountPath: /var/lib/crowdsec/data
            - name: config
              mountPath: /etc/crowdsec/profiles.d/
            - name: traefik-logs
              mountPath: /var/log/traefik
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: crowdsec-config
        - name: data
          persistentVolumeClaim:
            claimName: crowdsec-data
        - name: traefik-logs
          hostPath:
            path: /var/log/traefik
            type: DirectoryOrCreate
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/name
                    operator: In
                    values:
                      - traefik
              topologyKey: kubernetes.io/hostname
