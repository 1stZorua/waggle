apiVersion: apps/v1
kind: Deployment
metadata:
  name: crowdsec
  namespace: security
  labels:
    app: crowdsec
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crowdsec
  template:
    metadata:
      labels:
        app: crowdsec
    spec:
      containers:
        - name: crowdsec
          image: '{{ .Values.image.repository }}:{{ .Values.image.tag }}'
          ports:
            - name: lapi
              containerPort: {{ .Values.service.port | int }}
              protocol: TCP
            - name: syslog
              containerPort: 5140
              protocol: TCP
          env:
            - name: COLLECTIONS
              value: {{ join " " .Values.collections | quote }}
          volumeMounts:
            - name: config
              mountPath: /etc/crowdsec/acquis.yaml
              subPath: acquis.yaml
            - name: data
              mountPath: /var/lib/crowdsec/data
            - name: config
              mountPath: /etc/crowdsec/profiles.d/
      volumes:
        - name: config
          configMap:
            name: crowdsec-config
        - name: data
          persistentVolumeClaim:
            claimName: crowdsec-data