apiVersion: v1
kind: ConfigMap
metadata:
  name: crowdsec-config
  namespace: security
data:
  acquis.yaml: |
    source: k8s
    pod_name: gateway-traefik
    namespace: gateway
    container_name: traefik
    labels:
      type: traefik

{{- if .Values.profiles.sqli.enabled }}
  sqli-profile.yaml: |
    name: sqli-ban
    filters:
      - Alert.Scenario == "crowdsecurity/http-sqli-probing"
    decisions:
      - type: ban
        duration: {{ .Values.profiles.sqli.banDuration }}
{{- end }}
