apiVersion: v1
kind: ConfigMap
metadata:
  name: crowdsec-config
  namespace: security
data:
  acquis.yaml: |
    source: file
    filenames:
      - /var/log/traefik/access.log
    labels:
      type: traefik

{{- if .Values.profiles.sqli.enabled }}
  sqli-profile.yaml: |
    name: sqli-ban
    filters:
      - Alert.Scenario == "crowdsecurity/http-sqli"
    decisions:
      - type: ban
        duration: {{ .Values.profiles.sqli.banDuration }}
{{- end }}