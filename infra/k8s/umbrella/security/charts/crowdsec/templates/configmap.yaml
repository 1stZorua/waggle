apiVersion: v1
kind: ConfigMap
metadata:
  name: crowdsec-config
  namespace: security
data:
  acquis.yaml: |
    ---
    source: appsec
    listen_addr: "0.0.0.0:7422"
    path: /
    appsec_config: crowdsecurity/crs-vpatch
    labels:
      type: appsec

{{- if .Values.profiles.sqli.enabled }}
  sqli-profile.yaml: |
    name: sqli-ban
    filters:
      - Alert.Scenario == "crowdsecurity/http-sqli-probing"
    decisions:
      - type: ban
        duration: {{ .Values.profiles.sqli.banDuration }}
{{- end }}