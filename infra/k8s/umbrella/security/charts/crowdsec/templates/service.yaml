apiVersion: v1
kind: Service
metadata:
  name: crowdsec-service
  namespace: security
  labels:
    app: crowdsec
spec:
  type: ClusterIP
  selector:
    app: crowdsec
  ports:
    - port: {{ .Values.service.port }}
      targetPort: lapi
      name: lapi
    - port: 514
      targetPort: syslog
      name: syslog
      protocol: TCP