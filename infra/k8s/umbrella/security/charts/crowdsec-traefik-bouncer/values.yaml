crowdsec:
  mode: stream
  lapiHost: crowdsec-service.security
  lapiPort: 8080
  lapiKey: ''

  appsec:
    enabled: true
    host: crowdsec-service.security
    port: 7422
    failureBlock: true
    unreachableBlock: false

  logLevel: INFO
  updateIntervalSeconds: 10
  defaultDecisionSeconds: 10

traefik:
  namespace: gateway
