userservice-db:
  auth:
    username: waggle
    password: waggle
    database: userservice
  primary:
    persistence:
      enabled: true
      size: 1Gi
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
  replication:
    enabled: true
    replicaCount: 2
    replica:
      persistence:
        enabled: true
        size: 1Gi
      resources:
        requests:
          cpu: 200m
          memory: 256Mi
        limits:
          cpu: 400m
          memory: 512Mi
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
  fullnameOverride: userservice-db

