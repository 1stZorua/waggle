apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: monitoring-fluent-bit
  namespace: monitoring
  labels:
    app: fluent-bit
spec:
  selector:
    matchLabels:
      app: fluent-bit
  template:
    metadata:
      labels:
        app: fluent-bit
    spec:
      serviceAccountName: monitoring-fluent-bit
      containers:
        - name: fluent-bit
          image: fluent/fluent-bit:4.1.1
          imagePullPolicy: IfNotPresent
          args:
            - /fluent-bit/bin/fluent-bit
            - -c
            - /fluent-bit/etc/fluent-bit.conf
          volumeMounts:
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: varlibdockercontainers
              mountPath: /var/lib/docker/containers
              readOnly: true
            - name: crowdsec-lua
              mountPath: /fluent-bit/etc/crowdsec.lua
              subPath: crowdsec.lua
              readOnly: true
            - name: parsers
              mountPath: /fluent-bit/etc/parsers.conf
              subPath: parsers.conf
              readOnly: true
            - name: custom-parsers
              mountPath: /fluent-bit/etc/custom_parsers.conf
              subPath: custom_parsers.conf
              readOnly: true
      volumes:
        - name: varlog
          hostPath:
            path: /var/log
        - name: varlibdockercontainers
          hostPath:
            path: /var/lib/docker/containers
        - name: crowdsec-lua
          configMap:
            name: monitoring-fluent-bit-crowdsec-lua
        - name: parsers
          configMap:
            name: monitoring-fluent-bit-parsers
        - name: custom-parsers
          configMap:
            name: monitoring-fluent-bit-custom-parsers
