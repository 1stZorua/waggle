fluent-bit:
  config:
    service: |
      [SERVICE]
          Daemon Off
          Flush 1
          Log_Level info
          Parsers_File /fluent-bit/etc/parsers.conf
          Parsers_File /fluent-bit/etc/custom_parsers.conf
          HTTP_Server On
          HTTP_Listen 0.0.0.0
          HTTP_Port 2020
          Health_Check On

    inputs: |
      [INPUT]
          Name tail
          Path /var/log/containers/*gateway-traefik*.log
          multiline.parser docker, cri
          Tag traefik
          Mem_Buf_Limit 5MB
          Skip_Long_Lines On
          Parser json

    filters: |
      [FILTER]
          Name lua
          Match traefik
          Script /fluent-bit/etc/crowdsec.lua
          Call process

    outputs: |
      [OUTPUT]
          Name syslog
          Match traefik
          Host crowdsec-service.security.svc.cluster.local
          Port 5140
          Mode udp
          Syslog_Format rfc5424
          Syslog_Message_key log

  daemonSetVolumes:
    - name: varlog
      hostPath:
        path: /var/log
    - name: varlibdockercontainers
      hostPath:
        path: /var/lib/docker/containers
    - name: crowdsec-lua
      configMap:
        name: {{ include "fluent-bit.fullname" . }}-crowdsec-lua
    - name: parsers
      configMap:
        name: {{ include "fluent-bit.fullname" . }}-parsers
    - name: custom-parsers
      configMap:
        name: {{ include "fluent-bit.fullname" . }}-custom-parsers

  daemonSetVolumeMounts:
    - name: varlog
      mountPath: /var/log
      readOnly: true
    - name: varlibdockercontainers
      mountPath: /var/lib/docker/containers
      readOnly: true
    - name: crowdsec-lua
      mountPath: /fluent-bit/etc/crowdsec.lua
      subPath: crowdsec.lua
      readOnly: true
    - name: parsers
      mountPath: /fluent-bit/etc/parsers.conf
      subPath: parsers.conf
      readOnly: true
    - name: custom-parsers
      mountPath: /fluent-bit/etc/custom_parsers.conf
      subPath: custom_parsers.conf
      readOnly: true

  serviceAccount:
    create: true

  rbac:
    create: true

  resources:
    limits:
      cpu: 200m
      memory: 128Mi
    requests:
      cpu: 100m
      memory: 64Mi
