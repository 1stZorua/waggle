fluent-bit:
  enabled: true

  config:
    service: |
      [SERVICE]
          Daemon Off
          Flush 1
          Log_Level info
          Parsers_File /fluent-bit/etc/parsers.conf
          HTTP_Server On
          HTTP_Listen 0.0.0.0
          HTTP_Port 2020
          Health_Check On

    inputs: |
      [INPUT]
          Name tail
          Path /var/log/containers/*traefik*.log
          multiline.parser docker, cri
          Tag traefik
          Mem_Buf_Limit 5MB
          Skip_Long_Lines On
          Parser cri

    filters: |
      [FILTER]
          Name parser
          Match traefik
          Key_Name log
          Parser json
          Reserve_Data On
          Preserve_Key On

    outputs: |
      [OUTPUT]
          Name file
          Match traefik
          Path /var/log/crowdsec/
          File traefik.log
          Format plain

  daemonSetVolumes:
    - name: varlog
      hostPath:
        path: /var/log
    - name: varlibdockercontainers
      hostPath:
        path: /var/lib/docker/containers
    - name: crowdsec-logs
      hostPath:
        path: /var/log/crowdsec
        type: DirectoryOrCreate

  daemonSetVolumeMounts:
    - name: varlog
      mountPath: /var/log
      readOnly: true
    - name: varlibdockercontainers
      mountPath: /var/lib/docker/containers
      readOnly: true
    - name: crowdsec-logs
      mountPath: /var/log/crowdsec

  serviceAccount:
    create: true

  rbac:
    create: true

  resources:
    limits:
      cpu: 200m
      memory: 128Mi
    requests:
      cpu: 100m
      memory: 64Mi
