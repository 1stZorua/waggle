fluent-bit:
  config:
    service: |
      [SERVICE]
          Daemon Off
          Flush 1
          Log_Level info
          Parsers_File /fluent-bit/etc/parsers.conf
          Parsers_File /fluent-bit/etc/conf/custom_parsers.conf
          HTTP_Server On
          HTTP_Listen 0.0.0.0
          HTTP_Port 2020
          Health_Check On

    inputs: |
      [INPUT]
          Name tail
          Path /var/log/containers/*gateway-traefik*.log
          multiline.parser docker,cri
          Tag traefik
          Mem_Buf_Limit 5MB
          Skip_Long_Lines On
          Parser json

    filters: |
      [FILTER]
          Name grep
          Match traefik
          Regex log ClientAddr

      # Optional Lua filter
      #[FILTER]
      #    Name lua
      #    Match traefik
      #    Script /fluent-bit/etc/lua/crowdsec.lua
      #    Call parse_json

    outputs: |
      [OUTPUT]
          Name syslog
          Match traefik
          Host crowdsec-service.security.svc.cluster.local
          Port 5140
          Mode udp
          Syslog_Format rfc5424
          Syslog_Message_key log

  daemonSetVolumes:
    - name: varlog
      hostPath:
        path: /var/log
    - name: varlibdockercontainers
      hostPath:
        path: /var/lib/docker/containers
    # Optional Lua ConfigMap
    #- name: lua-scripts
    #  configMap:
    #    name: fluent-bit-lua

  daemonSetVolumeMounts:
    - name: varlog
      mountPath: /var/log
      readOnly: true
    - name: varlibdockercontainers
      mountPath: /var/lib/docker/containers
      readOnly: true
    # Optional Lua mount
    #- name: lua-scripts
    #  mountPath: /fluent-bit/etc/lua
    #  readOnly: true

  serviceAccount:
    create: true

  rbac:
    create: true

  resources:
    limits:
      cpu: 200m
      memory: 128Mi
    requests:
      cpu: 100m
      memory: 64Mi
