{{- if .Values.keycloak.ingressRoute.enabled }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ .Release.Name }}-ingressroute
  namespace: {{ .Release.Namespace }}
spec:
  entryPoints:
    - web
    - websecure
  routes:
    - match: Host(`{{ .Values.keycloak.ingressRoute.host }}`)
      kind: Rule
      services:
        - name: {{ .Release.Name }}-keycloak
          port: {{ .Values.keycloak.service.port }}
      middlewares:
        - name: internal-whitelist
          namespace: gateway
        - name: rate-limit-internal
          namespace: gateway
  tls:
    secretName: {{ .Release.Name }}-local-tls
{{- end}}