apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.name }}-depl
  labels:
    app: {{ .Values.name }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.name }}
    spec:
      containers:
        - name: {{ .Values.name }}
          image: {{ .Values.image }}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: {{ .Values.httpPort }}
            - name: grpc
              containerPort: {{ .Values.grpcPort }}
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Development
            - name: KEYCLOAK_AUTH_SERVER_URL
              value: "http://keycloak.keycloak.svc.cluster.local:80"
            - name: KEYCLOAK_REALM
              value: "test-realm"
            - name: KEYCLOAK_CLIENT_ID
              value: "test-client"
            - name: KEYCLOAK_CLIENT_SECRET
              value: "r6RYJCGbdaIPpNzWWJ1qXfALBemV3Dfg"        
            - name: KEYCLOAK_ADMIN_CLIENT_ID
              value: "admin-cli"
            - name: KEYCLOAK_ADMIN_CLIENT_SECRET
              value: "TQ7ytUL4f3POIheMA6eSQOumwyIRGR1J"
            - name: Kestrel__Endpoints__webApi__Url
              value: "http://+:8080"
            - name: Kestrel__Endpoints__Grpc__Url
              value: "http://+:8081"
            - name: GrpcUser
              value: "http://userservice-svc:8081"
