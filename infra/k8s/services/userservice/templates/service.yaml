apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.name }}-svc
spec:
  type: ClusterIP
  selector:
    app: {{ .Values.name }}
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.httpPort }}
      targetPort: {{ .Values.httpPort }}
    - name: grpc
      protocol: TCP
      port: {{ .Values.grpcPort }}
      targetPort: {{ .Values.grpcPort }}
