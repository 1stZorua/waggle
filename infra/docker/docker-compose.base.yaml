      - KEYCLOAK_AUTHORITY=${KEYCLOAK_AUTHORITY}
      - KEYCLOAK_AUDIENCE=${KEYCLOAK_AUDIENCE}

      - POSTGRES_HOST=${POSTSERVICE_DB_HOST}
      - POSTGRES_PORT=${POSTSERVICE_DB_PORT}
      - POSTGRES_DB=${POSTSERVICE_DB_NAME}
      - POSTGRES_USER=${POSTSERVICE_DB_USER}
      - POSTGRES_PASSWORD=${POSTSERVICE_DB_PASSWORD}

      - RabbitMQ__Host=${RabbitMQ__Host}
      - RabbitMQ__Port=${RabbitMQ__Port}
      - RabbitMQ__Username=${RabbitMQ__Username}
      - RabbitMQ__Password=${RabbitMQ__Password}
      - RabbitMQ__VirtualHost=${RabbitMQ__VirtualHost}

      - Kestrel__Endpoints__webApi__Url=${Kestrel__Endpoints__webApi__Url}
      - Kestrel__Endpoints__Grpc__Url=${Kestrel__Endpoints__Grpc__Url}
      - GrpcUser=${GrpcUser}
      - GrpcMedia=${GrpcMedia}
      - GrpcLike=${GrpcLike}
      - GrpcComment=${GrpcComment}
    depends_on:
      postservice-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      mediaservice:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'timeout 5 bash -c "</dev/tcp/localhost/8080" && timeout 5 bash -c "echo -e \"GET /health HTTP/1.1\r\nHost: localhost\r\n\r\n\" > /dev/tcp/localhost/8080" || exit 1'
