version: '3.9'

services:
  postgres:
    image: postgres:15
    container_name: keycloak-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', 'keycloak']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - waggle

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: keycloak
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HOSTNAME_STRICT: false
      KC_HOSTNAME_STRICT_HTTPS: false
      KC_HTTP_ENABLED: true
    command: start-dev
    ports:
      - '${KEYCLOAK_PORT}:8080'
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'exec 3<>/dev/tcp/localhost/8080']
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s
    networks:
      - waggle

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - '${RABBITMQ_MANAGEMENT_PORT}:${RABBITMQ_MANAGEMENT_PORT}'
      - '${RABBITMQ_MESSAGING_PORT}:${RABBITMQ_MESSAGING_PORT}'
    environment:
      - RABBITMQ_DEFAULT_USER=admin
      - RABBITMQ_DEFAULT_PASS=admin
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - waggle
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 10s
      retries: 5

  authservice:
    container_name: authservice
    ports:
      - '${AUTH_SERVICE_HTTP_PORT}:8080'
      - '${AUTH_SERVICE_GRPC_PORT}:8081'
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}

      - KEYCLOAK_AUTH_SERVER_URL=${KEYCLOAK_AUTH_SERVER_URL}
      - KEYCLOAK_REALM=${KEYCLOAK_REALM}
      - KEYCLOAK_CLIENT_ID=${KEYCLOAK_CLIENT_ID}
      - KEYCLOAK_CLIENT_SECRET=${KEYCLOAK_CLIENT_SECRET}
      - KEYCLOAK_ADMIN_CLIENT_ID=${KEYCLOAK_ADMIN_CLIENT_ID}
      - KEYCLOAK_ADMIN_CLIENT_SECRET=${KEYCLOAK_ADMIN_CLIENT_SECRET}

      - RabbitMQ__Host=${RabbitMQ__Host}
      - RabbitMQ__Port=${RabbitMQ__PORT}
      - RabbitMQ__Username=${RabbitMQ__Username}
      - RabbitMQ__Password=${RabbitMQ__Password}
      - RabbitMQ__VirtualHost=${RabbitMQ__VirtualHost}

      - Kestrel__Endpoints__webApi__Url=${Kestrel__Endpoints__webApi__Url}
      - Kestrel__Endpoints__Grpc__Url=${Kestrel__Endpoints__Grpc__Url}
      - GrpcUser=${GrpcUser}
    depends_on:
      keycloak:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'timeout 5 bash -c "</dev/tcp/localhost/8080" && timeout 5 bash -c "echo -e \"GET /health HTTP/1.1\r\nHost: localhost\r\n\r\n\" > /dev/tcp/localhost/8080" || exit 1'
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - waggle
    restart: unless-stopped

  userservice:
    container_name: userservice
    ports:
      - '${USER_SERVICE_HTTP_PORT}:8080'
      - '${USER_SERVICE_GRPC_PORT}:8081'
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}

      - RabbitMQ__Host=${RabbitMQ__Host}
      - RabbitMQ__Port=${RabbitMQ__PORT}
      - RabbitMQ__Username=${RabbitMQ__Username}
      - RabbitMQ__Password=${RabbitMQ__Password}
      - RabbitMQ__VirtualHost=${RabbitMQ__VirtualHost}

      - Kestrel__Endpoints__webApi__Url=${Kestrel__Endpoints__webApi__Url}
      - Kestrel__Endpoints__Grpc__Url=${Kestrel__Endpoints__Grpc__Url}
      - GrpcUser=${GrpcAuth}
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'timeout 5 bash -c "</dev/tcp/localhost/8080" && timeout 5 bash -c "echo -e \"GET /health HTTP/1.1\r\nHost: localhost\r\n\r\n\" > /dev/tcp/localhost/8080" || exit 1'
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - waggle
    restart: unless-stopped

  web:
    container_name: web
    ports:
      - '${WEB_PORT}:3000'
    environment:
      - NODE_ENV=${NODE_ENV}
      - ORIGIN=${ORIGIN}
      - AUTH_SERVICE_BASE_URL=${AUTH_SERVICE_BASE_URL}
      - USER_SERVICE_BASE_URL=${USER_SERVICE_BASE_URL}
    depends_on:
      authservice:
        condition: service_healthy
      userservice:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          'http.get("http://localhost:3000/health",(r)=>{process.exit(r.statusCode===200?0:1)}).on("error",()=>{process.exit(1)})'
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - waggle
    restart: unless-stopped

volumes:
  postgres_data:
  rabbitmq_data:

networks:
  waggle:
    external: true
