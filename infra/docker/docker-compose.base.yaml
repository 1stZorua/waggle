      likeservice:
        condition: service_healthy
      favoriteservice:
        condition: service_healthy
      followservice:
        condition: service_healthy
      commentservice:
        condition: service_healthy
      userservice:
        condition: service_healthy
      mediaservice:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          'http.get("http://localhost:3000/health",(r)=>{process.exit(r.statusCode===200?0:1)}).on("error",()=>{process.exit(1)})'
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - waggle
    restart: unless-stopped

volumes:
