version: '3.9'

services:
  postgres:
    image: postgres:15
    container_name: keycloak-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', '${POSTGRES_USER}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - waggle

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: keycloak
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HOSTNAME_STRICT: false
      KC_HOSTNAME_STRICT_HTTPS: false
      KC_HTTP_ENABLED: true
    command: start-dev
    ports:
      - '${KEYCLOAK_PORT}:8080'
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'exec 3<>/dev/tcp/localhost/8080']
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s
    networks:
      - waggle

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - '${RABBITMQ_MANAGEMENT_PORT}:${RABBITMQ_MANAGEMENT_PORT}'
      - '${RABBITMQ_MESSAGING_PORT}:${RABBITMQ_MESSAGING_PORT}'
    environment:
      - RABBITMQ_DEFAULT_USER=admin
      - RABBITMQ_DEFAULT_PASS=admin
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - waggle
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 10s
      retries: 5

  mediastore:
    image: minio/minio:latest
    container_name: mediastore
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - mediastore_data:/data
    networks:
      - waggle
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:9000/minio/health/live || exit 1']
      interval: 15s
      timeout: 10s
      retries: 5

  mediaservice-db:
    image: postgres:15
    container_name: mediaservice-postgres
    ports:
      - '5433:5432'
    environment:
      POSTGRES_DB: ${MEDIASERVICE_DB_NAME}
      POSTGRES_USER: ${MEDIASERVICE_DB_USER}
      POSTGRES_PASSWORD: ${MEDIASERVICE_DB_PASSWORD}
    volumes:
      - mediaservice_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', '${MEDIASERVICE_DB_USER}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - waggle

  mediaservice:
    container_name: mediaservice
    ports:
      - '${MEDIA_SERVICE_HTTP_PORT}:8080'
      - '${MEDIA_SERVICE_GRPC_PORT}:8081'
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}

      - KEYCLOAK_AUTHORITY=${KEYCLOAK_AUTHORITY}
      - KEYCLOAK_AUDIENCE=${KEYCLOAK_AUDIENCE}

      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - MINIO_SERVER_URL=${MINIO_SERVER_URL}

      - POSTGRES_HOST=${MEDIASERVICE_DB_HOST}
      - POSTGRES_PORT=${MEDIASERVICE_DB_PORT}
      - POSTGRES_DB=${MEDIASERVICE_DB_NAME}
      - POSTGRES_USER=${MEDIASERVICE_DB_USER}
      - POSTGRES_PASSWORD=${MEDIASERVICE_DB_PASSWORD}

      - RabbitMQ__Host=${RabbitMQ__Host}
      - RabbitMQ__Port=${RabbitMQ__Port}
      - RabbitMQ__Username=${RabbitMQ__Username}
      - RabbitMQ__Password=${RabbitMQ__Password}
      - RabbitMQ__VirtualHost=${RabbitMQ__VirtualHost}

      - Kestrel__Endpoints__webApi__Url=${Kestrel__Endpoints__webApi__Url}
      - Kestrel__Endpoints__Grpc__Url=${Kestrel__Endpoints__Grpc__Url}

      - Minio__ExternalHost=${MINIO_SERVER_URL}

      - Media__Buckets__Posts=posts
      - Media__Buckets__Users=users
    depends_on:
      mediastore:
        condition: service_healthy
      mediaservice-db:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'timeout 5 bash -c "</dev/tcp/localhost/8080" && timeout 5 bash -c "echo -e \"GET /health HTTP/1.1\r\nHost: localhost\r\n\r\n\" > /dev/tcp/localhost/8080" || exit 1'
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - waggle
    restart: unless-stopped

  authservice:
    container_name: authservice
    ports:
      - '${AUTH_SERVICE_HTTP_PORT}:8080'
      - '${AUTH_SERVICE_GRPC_PORT}:8081'
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}

      - KEYCLOAK_AUTH_SERVER_URL=${KEYCLOAK_AUTH_SERVER_URL}
      - KEYCLOAK_REALM=${KEYCLOAK_REALM}
      - KEYCLOAK_CLIENT_ID=${KEYCLOAK_CLIENT_ID}
      - KEYCLOAK_CLIENT_SECRET=${KEYCLOAK_CLIENT_SECRET}
      - KEYCLOAK_ADMIN_CLIENT_ID=${KEYCLOAK_ADMIN_CLIENT_ID}
      - KEYCLOAK_ADMIN_CLIENT_SECRET=${KEYCLOAK_ADMIN_CLIENT_SECRET}

      - KEYCLOAK_AUTHORITY=${KEYCLOAK_AUTHORITY}
      - KEYCLOAK_AUDIENCE=${KEYCLOAK_AUDIENCE}

      - RabbitMQ__Host=${RabbitMQ__Host}
      - RabbitMQ__Port=${RabbitMQ__Port}
      - RabbitMQ__Username=${RabbitMQ__Username}
      - RabbitMQ__Password=${RabbitMQ__Password}
      - RabbitMQ__VirtualHost=${RabbitMQ__VirtualHost}

      - Kestrel__Endpoints__webApi__Url=${Kestrel__Endpoints__webApi__Url}
      - Kestrel__Endpoints__Grpc__Url=${Kestrel__Endpoints__Grpc__Url}
      - GrpcUser=${GrpcUser}

      - AUTH_MIN_USERNAME_LENGTH=${AUTH_MIN_USERNAME_LENGTH}
      - AUTH_MAX_USERNAME_LENGTH=${AUTH_MAX_USERNAME_LENGTH}
      - AUTH_MIN_PASSWORD_LENGTH=${AUTH_MIN_PASSWORD_LENGTH}
      - AUTH_MAX_PASSWORD_LENGTH=${AUTH_MAX_PASSWORD_LENGTH}
    depends_on:
      keycloak:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'timeout 5 bash -c "</dev/tcp/localhost/8080" && timeout 5 bash -c "echo -e \"GET /health HTTP/1.1\r\nHost: localhost\r\n\r\n\" > /dev/tcp/localhost/8080" || exit 1'
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - waggle
    restart: unless-stopped

  postservice-db:
    image: postgres:15
    container_name: postservice-postgres
    ports:
      - '5434:5432'
    environment:
      POSTGRES_DB: ${POSTSERVICE_DB_NAME}
      POSTGRES_USER: ${POSTSERVICE_DB_USER}
      POSTGRES_PASSWORD: ${POSTSERVICE_DB_PASSWORD}
    volumes:
