syntax = "proto3";

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

option csharp_namespace = "Waggle.Contracts.Media.Grpc";

package media;

service GrpcMedia {
	rpc GetAllMedia(GetAllMediaRequest) returns (GetAllMediaResponse);
	rpc GetMediaById(GetMediaByIdRequest) returns (GetMediaByIdResponse);
	rpc GetMediaByIds(GetMediaByIdsRequest) returns (GetMediaByIdsResponse);
	rpc GetMediaUrl(GetMediaUrlRequest) returns (GetMediaUrlResponse);
	rpc GetMediaUrls(GetMediaUrlsRequest) returns (GetMediaUrlsResponse);
	rpc UploadMedia(UploadMediaRequest) returns (UploadMediaResponse);
	rpc DeleteMedia(DeleteMediaRequest) returns (google.protobuf.Empty);
}

enum PaginationDirection {
	FORWARD = 0;
	BACKWARD = 1;
}

message PageInfo {
	string next_cursor = 1;
	string previous_cursor = 2;
	bool has_next_page = 3;
	bool has_previous_page = 4;
	int32 page_size = 5;
}

message GetAllMediaRequest {
	string cursor = 1;
	int32 page_size = 2;
	PaginationDirection direction = 3;
}

message GetAllMediaResponse {
	repeated Media media = 1;
	PageInfo page_info = 2;
}

message GetMediaByIdRequest {
	string id = 1;
}

message GetMediaByIdResponse {
	Media media = 1;
}

message GetMediaByIdsRequest {
    repeated string ids = 1;
}

message GetMediaByIdsResponse {
    repeated Media media = 1;
}

message GetMediaUrlRequest {
	string id = 1;
}

message GetMediaUrlResponse {
	string url = 1;
	google.protobuf.Timestamp expires_at = 2;
}

message GetMediaUrlsRequest {
    repeated string ids = 1;
}

message GetMediaUrlsResponse {
    map<string, MediaUrl> urls = 1;
}

message MediaUrl {
	string url = 1;
	google.protobuf.Timestamp expires_at = 2;
}

message UploadMediaRequest {
	string bucket_name = 1;
	string prefix = 2;
	bytes file = 3;
}

message UploadMediaResponse {
	Media media = 1;
}

message Media {
	string id = 1;
	string uploader_id = 2;
	string bucket_name = 3;
	string object_name = 4;
	string file_name = 5;
	string content_type = 6;
	int64 file_size = 7;
	google.protobuf.Timestamp created_at = 8;
}

message DeleteMediaRequest {
	string id = 1;
}