syntax = "proto3";

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

option csharp_namespace = "Waggle.Contracts.User.Grpc";

package user;

service GrpcUser {
	rpc GetUsers(GetUsersRequest) returns (GetUsersResponse);
	rpc GetUserById(GetUserByIdRequest) returns (GetUserByIdResponse);
	rpc GetUsersById(GetUsersByIdRequest) returns (GetUsersByIdResponse);
	rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);
	rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse);
	rpc DeleteUser(DeleteUserRequest) returns (google.protobuf.Empty);
}

enum PaginationDirection {
  FORWARD = 0;
  BACKWARD = 1;
}

message PageInfo {
  string next_cursor = 1;
  string previous_cursor = 2;
  bool has_next_page = 3;
  bool has_previous_page = 4;
  int32 page_size = 5;
}

message GetUsersRequest {
  string cursor = 1;
  int32 page_size = 2;
  PaginationDirection direction = 3;
}

message GetUsersResponse {
	repeated User users = 1;
	PageInfo page_info = 2;
}

message GetUserByIdRequest {
	string id = 1;
}

message GetUserByIdResponse {
	User user = 1;
}

message GetUsersByIdRequest {
    repeated string ids = 1;
}

message GetUsersByIdResponse {
    repeated User user = 1;
}

message CreateUserRequest {
	string id = 1;
	string username = 2;
	string email = 3;
	string first_name = 4;
	string last_name = 5;
}

message CreateUserResponse {
	User user = 1;
}

message UpdateUserRequest {
	string id = 1;
	string avatar_id = 2;
}

message UpdateUserResponse {
	User user = 1;
}

message UrlResponse {
	string url = 1;
	google.protobuf.Timestamp expires_at = 2;
}

message User {
	string id = 1;
	string username = 2;
	string email = 3;
	string first_name = 4;
	string last_name = 5;
	string avatar_id = 6;
	google.protobuf.Timestamp created_at = 7;
	UrlResponse avatar_url = 8;
	int32 post_count = 9;
	int32 follower_count = 10;
	int32 following_count = 11;
}

message DeleteUserRequest {
	string id = 1;
}