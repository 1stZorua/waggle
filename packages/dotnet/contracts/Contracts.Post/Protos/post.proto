syntax = "proto3";

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

option csharp_namespace = "Waggle.Contracts.Post.Grpc";

package post;

service GrpcPost {
	rpc GetPosts(GetPostsRequest) returns (GetPostsResponse);
	rpc GetPostById(GetPostByIdRequest) returns (GetPostByIdResponse);
	rpc GetPostsByUserId(GetPostsByUserIdRequest) returns (GetPostsByUserIdResponse);
	rpc GetPostCounts(GetPostCountsRequest) returns (GetPostCountsResponse);
	rpc CreatePost(CreatePostRequest) returns (CreatePostResponse);
	rpc UpdatePost(UpdatePostRequest) returns (UpdatePostResponse);
	rpc DeletePost(DeletePostRequest) returns (google.protobuf.Empty);
}

enum PaginationDirection {
	FORWARD = 0;
	BACKWARD = 1;
}

message PageInfo {
	string next_cursor = 1;
	string previous_cursor = 2;
	bool has_next_page = 3;
	bool has_previous_page = 4;
	int32 page_size = 5;
}

message GetPostsRequest {
	string cursor = 1;
	int32 page_size = 2;
	PaginationDirection direction = 3;
}

message GetPostsResponse {
	repeated Post posts = 1;
	PageInfo page_info = 2;
}

message GetPostByIdRequest {
	string id = 1;
}

message GetPostByIdResponse {
	Post post = 1;
}

message GetPostsByUserIdRequest {
	string user_id = 1;
	string cursor = 2;
	int32 page_size = 3;
	PaginationDirection direction = 4;
}

message GetPostsByUserIdResponse {
	repeated Post posts = 1;
	PageInfo page_info = 2;
}

message GetPostCountsRequest {
	repeated string user_ids = 1;
}

message PostCount {
	string user_id = 1;
	int32 count = 2;
}

message GetPostCountsResponse {
	repeated PostCount counts = 1;
}

message CreatePostRequest {
	string caption = 1;
	repeated string media_ids = 2;
}

message CreatePostResponse {
	Post post = 1;
}

message UpdatePostRequest {
	string id = 1;
	string caption = 2;
}

message UpdatePostResponse {
	Post post = 1;
}

message Post {
	string id = 1;
	string user_id = 2;
	string caption = 3;
	string thumbnail_id = 4;
	repeated string media_ids = 5; 
	google.protobuf.Timestamp created_at = 6;
	google.protobuf.Timestamp updated_at = 7;
}

message DeletePostRequest {
	string id = 1;
}