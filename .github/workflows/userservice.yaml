name: UserService CI/CD

on:
  push:
    branches:
      - '**'
    paths:
      - 'apps/userservice/**'
      - 'packages/dotnet/**'
      - '.github/workflows/userservice.yaml'
  pull_request:
    branches:
      - main
      - dev
    paths:
      - 'apps/userservice/**'
      - 'packages/dotnet/**'
      - '.github/workflows/userservice.yaml'
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build/push Docker image'
        default: ''
        required: false

jobs:
  build_and_test:
    name: Build & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/userservice/UserService

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --verbosity normal

      - name: Publish build output
        run: dotnet publish -c Release

      - name: Upload build output
        uses: actions/upload-artifact@v4.6.2
        with:
          name: userservice-publish
          path: apps/userservice/UserService/bin/Release/net9.0

  publish_docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: build_and_test
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true)

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download build output
        uses: actions/download-artifact@v5
        with:
          name: userservice-publish

      - name: Login to Docker Hub
        uses: docker/login-action@v3.6.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Generate Docker Metadata
        id: meta
        uses: docker/metadata-action@v5.8.0
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/waggle-userservice
          tags: |
            type=ref,event=pr
            type=sha,format=short,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=stable,enable=${{ github.ref_name == 'main' }}
            type=raw,value=dev,enable=${{ github.ref_name == 'dev' }}
          labels: |
            org.opencontainers.image.source=${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6.18.0
        with:
          context: .
          file: ./apps/userservice/UserService/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
