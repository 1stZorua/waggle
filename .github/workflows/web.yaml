name: Web CI/CD

on:
  push:
    branches:
      - '**'
    paths:
      - 'apps/web/**'
      - 'packages/*'
      - '.github/workflows/web.yaml'
      - 'turbo.json'
  pull_request:
    branches:
      - main
      - dev
    paths:
      - 'apps/web/**'
      - 'packages/*'
      - '.github/workflows/web.yaml'
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build/push Docker image'
        default: ''
        required: false

jobs:
  build_and_test:
    name: Build & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --foreground-scripts

      - name: Generate API Types
        run: npm run generate:api
        working-directory: .

      - name: Build
        run: npm run build

      # - name: Run tests
      #   run: npm run test --if-present

      - name: Upload build output
        uses: actions/upload-artifact@v4.6.2
        with:
          name: web-build
          path: apps/web/build

  publish_docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: build_and_test
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true)

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download build output
        uses: actions/download-artifact@v5
        with:
          name: web-build

      - name: Login
        uses: docker/login-action@v3.6.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Generate Docker Metadata
        id: meta
        uses: docker/metadata-action@v5.8.0
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/waggle-web
          tags: |
            type=ref,event=pr
            type=sha,format=short,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=stable,enable=${{ github.ref_name == 'main' }}
            type=raw,value=dev,enable=${{ github.ref_name == 'dev' }}
          labels: |
            org.opencontainers.image.source=${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v6.18.0
        with:
          context: .
          file: ./apps/web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
